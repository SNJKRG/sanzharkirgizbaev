<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanzhar Kirgizbaev — Software Engineer</title>
    <meta
      name="description"
      content="Sanzhar Kirgizbaev — software engineer. Full web product lifecycle from idea to deployment."
    />
    <!-- favicons (served from public/ at site root) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

      rel="stylesheet"

    <link rel="preload" as="image" href="/assets/portrait.webp" />

    </style>
